version: '3.8'

services:
  transaction-db:
    image: postgres:15-alpine
    container_name: transaction-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transaction_db
    ports:
      - "5433:5432"
    volumes:
      - transaction_db_data:/var/lib/postgresql/data

  transaction-service:
    build: .
    container_name: transaction-service
    restart: always
    depends_on:
      - transaction-db
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@transaction-db:5432/transaction_db?schema=public"
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  transaction_db_data: