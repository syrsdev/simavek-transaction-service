version: '3.8'

services:
  transaction-db:
    image: postgres:15-alpine
    container_name: transaction-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transaction_db
    ports:
      - "5433:5432"
    volumes:
      - transaction_db_data:/var/lib/postgresql/data

volumes:
  transaction_db_data: